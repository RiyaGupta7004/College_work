<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
         .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Factorial Calculator</h2>

    <input type="number" id="number" placeholder="Enter a number">
    <br>
    <button onclick="calculateFactorial()">Calculate</button>

    <div id="result"></div>
</div>

<script>
    function calculateFactorial() {
        let num = document.getElementById("number").value;
        let resultDiv = document.getElementById("result");

        if (num === "" || num < 0) {
            resultDiv.innerHTML = "Please enter a valid positive number!";
            resultDiv.classList.add("error");
            return;
        }

        let factorial = 1;

        for (let i = 1; i <= num; i++) {
            factorial *= i;
        }

        resultDiv.classList.remove("error");
        resultDiv.innerHTML = "Factorial of " + num + " is: " + factorial;
    }
</script>

</body>
</html>
